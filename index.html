<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数码宝贝小游戏登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            /* 背景图 */
            background-image: url('./image/1.png');
            background-size: cover;
            background-position: center;
            position: relative;
            /* 核心：Grid布局 */
            display: grid;
            place-items: center;
        }

        /* 背景遮罩 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* 登录框：嵌套Grid排版内部元素 */
        .login-box {
            position: relative;
            z-index: 2;
            background: rgba(17, 24, 39, 0.8);
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            /* 内部元素用Grid布局 */
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto auto auto;
            gap: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
        }

        .login-box h2 {
            color: #00e5ff;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .input-box {
            width: 100%;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #00e5ff;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .input-box input::placeholder {
            color: #b3e5fc;
        }

        #loginBtn {
            padding: 12px;
            background: linear-gradient(90deg, #00b8d4, #00e5ff);
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #loginBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px #00e5ff;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>小游戏登录</h2>
        <div class="input-box">
            <input type="text" id="username" placeholder="您的名字">
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="口令--123456">
        </div>
        <button id="loginBtn">登录</button>
         <label for="a_" id="q" style="color: #e87590;">西南民族大学出品</label>
    <a href="https://www.swun.edu.cn/" target="_blank" id="a_" style="color: #e87590;">https://www.swun.edu.cn</a>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const username = document.getElementById('username');
        const password = document.getElementById('password');

        loginBtn.onclick = function() {
            const user = username.value.trim();
            const pwd = password.value.trim();
            if (user === '' || pwd === '') {
                alert('请输入用户名和密码！');
            } else if ( pwd === '123456') {
                alert('登录成功！尊贵的玩家--' + user + '，欢迎进入游戏世界～');
                window.location.href = 'game.html';
            } else {
                alert('口令错误！');
            }
        }
    </script>
   
</body>
</html>
