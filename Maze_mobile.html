<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>迷宫小游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:sans-serif}
.container{display:flex;flex-direction:column;align-items:center;gap:12px;padding:10px}
#info{font-size:18px;text-shadow:0 0 6px #4fc3f7}
#canvas{border:2px solid #4fc3f7;border-radius:8px;background:#0f1736}
#restart{padding:10px 20px;background:#4fc3f7;color:#000;border:none;border-radius:8px}
/* 方向键样式匹配截图 */
.control{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px}
.control .up-btn{width:70px;height:70px;font-size:24px;background:#2563eb;color:white;border:none;border-radius:12px;margin-bottom:8px}
.control .row-btn{display:flex;gap:8px}
.control .row-btn button{width:70px;height:70px;font-size:24px;background:#2563eb;color:white;border:none;border-radius:12px}
</style>
</head>
<body>
<div class="container">
  <div id="info">时间：0.0s 最佳：--</div>
  <canvas id="canvas"></canvas>
  <button id="restart">重新生成</button>
  <!-- 方向键布局改为上单独一行，下左右一行 -->
  <div class="control">
    <button class="up-btn" onclick="move(0,-1)">↑</button>
    <div class="row-btn">
      <button onclick="move(-1,0)">←</button>
      <button onclick="move(0,1)">↓</button>
      <button onclick="move(1,0)">→</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');
const restartBtn = document.getElementById('restart');

let size = Math.min(window.innerWidth - 20, window.innerHeight - 240);
canvas.width = size;
canvas.height = size;

const cell = 20;
const cols = Math.floor(size / cell);
const rows = Math.floor(size / cell);

let grid = [];
let stack = [];
let current;
let player = { x: 0, y: 0 };
let end = { x: cols - 1, y: rows - 1 };

let startTime = null;
let bestTime = localStorage.getItem('mazeBestTime') ? parseFloat(localStorage.getItem('mazeBestTime')) : null;

class Cell{
  constructor(x,y){
    this.x=x;this.y=y;
    this.walls=[true,true,true,true];
    this.visited=false;
  }
  draw(){
    const x=this.x*cell;
    const y=this.y*cell;
    ctx.strokeStyle='#4fc3f7';
    ctx.lineWidth=2;
    if(this.walls[0]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cell,y);ctx.stroke();}
    if(this.walls[1]){ctx.beginPath();ctx.moveTo(x+cell,y);ctx.lineTo(x+cell,y+cell);ctx.stroke();}
    if(this.walls[2]){ctx.beginPath();ctx.moveTo(x+cell,y+cell);ctx.lineTo(x,y+cell);ctx.stroke();}
    if(this.walls[3]){ctx.beginPath();ctx.moveTo(x,y+cell);ctx.lineTo(x,y);ctx.stroke();}
    if(this.visited){ctx.fillStyle='#1a2352';ctx.fillRect(x,y,cell,cell);}
  }
  checkNeighbors(){
    let n=[];
    let top=grid[index(this.x,this.y-1)];
    let right=grid[index(this.x+1,this.y)];
    let bottom=grid[index(this.x,this.y+1)];
    let left=grid[index(this.x-1,this.y)];
    if(top&&!top.visited)n.push(top);
    if(right&&!right.visited)n.push(right);
    if(bottom&&!bottom.visited)n.push(bottom);
    if(left&&!left.visited)n.push(left);
    return n.length?n[Math.floor(Math.random()*n.length)]:null;
  }
}

function index(x,y){
  if(x<0||y<0||x>=cols||y>=rows)return -1;
  return x+y*cols;
}

function initMaze(){
  grid=[];stack=[];
  player.x=0;player.y=0;
  startTime=null;
  updateInfo();
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)grid.push(new Cell(x,y));
  current=grid[0];current.visited=true;
}

function generateMaze(){
  let next=current.checkNeighbors();
  if(next){next.visited=true;stack.push(current);removeWalls(current,next);current=next;}
  else if(stack.length)current=stack.pop();
}

function removeWalls(a,b){
  let x=a.x-b.x;
  if(x===1){a.walls[3]=false;b.walls[1]=false;}
  if(x===-1){a.walls[1]=false;b.walls[3]=false;}
  let y=a.y-b.y;
  if(y===1){a.walls[0]=false;b.walls[2]=false;}
  if(y===-1){a.walls[2]=false;b.walls[0]=false;}
}

function drawPlayer(){
  ctx.fillStyle='#ffeb3b';ctx.shadowColor='#ffeb3b';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(player.x*cell+cell/2,player.y*cell+cell/2,cell/3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawEnd(){
  ctx.fillStyle='#ff5722';ctx.shadowColor='#ff5722';ctx.shadowBlur=12;
  ctx.fillRect(end.x*cell+cell/4,end.y*cell+cell/4,cell/2,cell/2);
  ctx.shadowBlur=0;
}

function updateInfo(){
  let now=startTime?(Date.now()-startTime)/1000:0;
  let best=bestTime?bestTime.toFixed(1)+'s':'--';
  info.textContent=`时间：${now.toFixed(1)}s  最佳：${best}`;
}

function loop(){
  ctx.clearRect(0,0,size,size);
  generateMaze();
  grid.forEach(c=>c.draw());
  drawEnd();
  drawPlayer();
  updateInfo();
  requestAnimationFrame(loop);
}

function move(dx,dy){
  if(!startTime)startTime=Date.now();
  let nx=player.x+dx;
  let ny=player.y+dy;
  let c=grid[index(player.x,player.y)];
  if(dx===1&&c.walls[1])return;
  if(dx===-1&&c.walls[3])return;
  if(dy===1&&c.walls[2])return;
  if(dy===-1&&c.walls[0])return;
  player.x=nx;
  player.y=ny;
  if(player.x===end.x&&player.y===end.y){
    let t=(Date.now()-startTime)/1000;
    let isNew=false;
    if(bestTime===null||t<bestTime){bestTime=t;localStorage.setItem('mazeBestTime',t);isNew=true;}
    setTimeout(()=>{
      if(isNew)alert(`通关！${t.toFixed(1)}秒 🎉 新纪录！`);
      else alert(`通关！${t.toFixed(1)}秒\n最佳：${bestTime.toFixed(1)}秒`);
      initMaze();
    },50);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp')move(0,-1);
  if(e.key==='ArrowDown')move(0,1);
  if(e.key==='ArrowLeft')move(-1,0);
  if(e.key==='ArrowRight')move(1,0);
});

restartBtn.onclick=initMaze;
initMaze();
loop();
</script>
</body>
</html>
