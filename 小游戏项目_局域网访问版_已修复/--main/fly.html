<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>飞机大战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#050822;font-family:sans-serif}
#game{position:relative;width:100vw;height:100vh;overflow:hidden}
#canvas{display:block;background:linear-gradient(to bottom,#050822,#0a1035)}
#score{position:absolute;top:88px;left:12px;color:#fff;font-size:18px;text-shadow:0 0 8px #4fc3f7;z-index:2}
#saveStatus{position:absolute;top:88px;right:12px;color:#cbd5e1;font-size:14px;z-index:2;background:rgba(15,23,42,.72);padding:8px 10px;border-radius:10px}
#tips{position:absolute;top:126px;left:12px;color:#cbd5e1;font-size:13px;z-index:2;line-height:1.7;background:rgba(15,23,42,.55);padding:10px 12px;border-radius:10px;max-width:340px}
#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff3d00;font-size:36px;font-weight:bold;text-align:center;display:none;background:rgba(2,6,23,.82);padding:26px;border-radius:18px;z-index:3}
#gameOver p{margin-top:10px;font-size:18px;color:#e2e8f0}
#restart{margin-top:20px;padding:12px 24px;background:#4fc3f7;color:#000;border:none;border-radius:8px;font-size:16px;box-shadow:0 0 15px #4fc3f7}
</style>
</head>
<body>
<div id="game">
<div id="score">分数：0</div>
<div id="saveStatus">待开始</div>
<div id="tips">点击屏幕发射子弹，拖动飞机躲避敌机。游戏结束后成绩会自动入库。</div>
<canvas id="canvas"></canvas>
<div id="gameOver">
  游戏结束
  <p id="finalInfo">本局分数：0</p>
  <p id="saveInfo">成绩保存中...</p>
  <button id="restart">重新开始</button>
</div>
</div>
<script src="/assets/platform.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const gameOver = document.getElementById('gameOver');
const restartBtn = document.getElementById('restart');
const saveStatus = document.getElementById('saveStatus');
const finalInfo = document.getElementById('finalInfo');
const saveInfo = document.getElementById('saveInfo');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

let score = 0;
let gameOverFlag = false;
let lastEnemy = 0;
let lastBullet = 0;
let submitted = false;

const player = { w:50, h:60, x:canvas.width/2 - 25, y:canvas.height - 100 };
let bullets = [];
let enemies = [];
let explosions = [];
let stars = [];

function initStars(){
  stars = [];
  for(let i=0;i<80;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*1.5+0.5,speed:Math.random()+0.3});
  }
}
initStars();

function drawStars(){
  ctx.fillStyle='#fff';
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
    s.y += s.speed;
    if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width}
  });
}

function drawPlayer(){
  ctx.save();
  ctx.shadowBlur=18;
  ctx.shadowColor='#4fc3f7';
  ctx.fillStyle='#4fc3f7';
  ctx.beginPath();
  ctx.moveTo(player.x+player.w/2,player.y);
  ctx.lineTo(player.x,player.y+player.h);
  ctx.lineTo(player.x+player.w,player.y+player.h);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#81d4fa';
  ctx.fillRect(player.x-10,player.y+30,20,8);
  ctx.fillRect(player.x+player.w-10,player.y+30,20,8);
  ctx.restore();
}

function createBullet(){
  const now = Date.now();
  if(now-lastBullet>250){
    bullets.push({x:player.x+player.w/2-2,y:player.y,w:4,h:12});
    lastBullet = now;
  }
}

function drawBullets(){
  ctx.fillStyle='#ffeb3b';
  ctx.shadowBlur=8;
  ctx.shadowColor='#ffeb3b';
  bullets.forEach((b,i)=>{
    ctx.fillRect(b.x,b.y,b.w,b.h);
    b.y-=7;
    if(b.y<-20)bullets.splice(i,1);
  });
  ctx.shadowBlur=0;
}

function createEnemy(){
  const now = Date.now();
  if(now-lastEnemy>1200){
    const s = Math.random()*25+35;
    enemies.push({x:Math.random()*(canvas.width-s),y:-s,w:s,h:s*0.8,speed:Math.random()*1.5+1.8});
    lastEnemy = now;
  }
}

function drawEnemies(){
  enemies.forEach((e,i)=>{
    ctx.save();
    ctx.shadowBlur=12;
    ctx.shadowColor='#ff9800';
    ctx.fillStyle='#ff9800';
    ctx.beginPath();
    ctx.moveTo(e.x+e.w/2,e.y+e.h);
    ctx.lineTo(e.x,e.y);
    ctx.lineTo(e.x+e.w,e.y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    e.y += e.speed;
    if(e.y>canvas.height)enemies.splice(i,1);
  });
}

function boom(x,y){ explosions.push({x,y,r:8,a:1}); }
function drawBoom(){
  explosions.forEach((ex,i)=>{
    ctx.save();
    ctx.globalAlpha=ex.a;
    ctx.strokeStyle='#ff5722';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
    ex.r += 2; ex.a -= 0.03;
    if(ex.a<=0)explosions.splice(i,1);
  });
}

function hit(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

async function saveScoreOnce(){
  if(submitted) return;
  submitted = true;
  saveStatus.textContent='保存中';
  saveInfo.textContent='成绩保存中...';
  try {
    await GamePlatform.submitScore({ gameKey:'fly', score, result:'completed', meta:{ enemiesDefeated: score / 10 } });
    saveStatus.textContent='已保存';
    saveInfo.textContent='本局成绩已写入数据库和排行榜。';
  } catch (error) {
    saveStatus.textContent='保存失败';
    saveInfo.textContent='保存失败：' + (error.message || '未知错误');
  }
}

function endGame(){
  gameOverFlag = true;
  finalInfo.textContent = '本局分数：' + score;
  gameOver.style.display='block';
  saveScoreOnce();
}

function checkHit(){
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(hit(b,e)){
        boom(e.x+e.w/2,e.y+e.h/2);
        bullets.splice(bi,1);
        enemies.splice(ei,1);
        score+=10;
        scoreText.textContent='分数：'+score;
      }
    });
  });
  enemies.forEach(e=>{ if(hit(player,e)) endGame(); });
}

function loop(){
  if(gameOverFlag) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawStars();
  drawPlayer();
  drawBullets();
  createEnemy();
  drawEnemies();
  drawBoom();
  checkHit();
  requestAnimationFrame(loop);
}

canvas.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  const touch = e.touches[0];
  const rx = touch.clientX - player.w/2;
  const ry = touch.clientY - player.h/2;
  if(rx>0 && rx<canvas.width-player.w)player.x=rx;
  if(ry>80 && ry<canvas.height-player.h)player.y=ry;
},{ passive:false });
canvas.addEventListener('mousemove',(e)=>{
  if(e.buttons !== 1) return;
  const rx = e.clientX - player.w/2;
  const ry = e.clientY - player.h/2;
  if(rx>0 && rx<canvas.width-player.w)player.x=rx;
  if(ry>80 && ry<canvas.height-player.h)player.y=ry;
});
canvas.addEventListener('click',()=>{ if(!gameOverFlag)createBullet(); });

restartBtn.addEventListener('click',()=>{
  score=0; submitted=false; gameOverFlag=false; lastEnemy=0; lastBullet=0;
  scoreText.textContent='分数：0';
  saveStatus.textContent='进行中';
  gameOver.style.display='none';
  bullets=[]; enemies=[]; explosions=[];
  player.x=canvas.width/2-player.w/2; player.y=canvas.height-100;
  initStars();
  loop();
});

GamePlatform.injectHeader({ paddingTop: 0 }).then(()=>{ saveStatus.textContent='进行中'; loop(); }).catch(()=>{});
</script>
</body>
</html>
